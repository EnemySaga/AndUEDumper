name: Build AndUEDumper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: r25c
      NDK_HOME: ${{ github.workspace }}/android-ndk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip android-ndk-${NDK_VERSION}-linux.zip
          mv android-ndk-${NDK_VERSION} android-ndk

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential make clang

      - name: Build the project
        working-directory: ./AndUEDumper
        run: |
          make clean
          make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: AndUEDumper-Binaries
          path: |
            AndUEDumper/UEDump3r_*
